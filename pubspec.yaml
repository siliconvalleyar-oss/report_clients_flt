name: report_clients_flt
description: Generador de Reportes Técnicos de Electromedicina
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^5.0.0
  pdf: ^3.8.0
  printing: ^5.9.0
  share_plus: ^4.0.0
  url_launcher: ^6.1.0
  image_picker: ^0.8.5
  signature: ^5.0.0
  hive_flutter: ^1.1.0
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/watermark.png
    - assets/fonts/
